name: backendbt

services:
  db:
    image: mysql:8.4
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - projectbt_db:/var/lib/mysql

  backend:
    build:
      context: ..
    env_file:
      - ../.env
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../prisma:/app/prisma
      - ../prisma.config.ts:/app/prisma.config.ts

volumes:
  projectbt_db:
